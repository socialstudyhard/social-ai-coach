<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>사회문제탐구 AI 도우미</title>

  <style>
    *{ box-sizing:border-box; }

    body{
      margin:0;
      padding:40px 20px;
      background:#f4f6fb;
      font-family:Pretendard, "Apple SD Gothic Neo", sans-serif;
      color:#222;
    }

    .container{
      max-width:900px;
      margin:0 auto;
    }

    .title-box, .card{
      background:white;
      border-radius:20px;
      padding:30px;
      margin-bottom:20px;
      box-shadow:0 8px 24px rgba(0,0,0,0.06);
    }

    h1{
      margin:0 0 10px;
      font-size:30px;
    }

    .subtitle{
      color:#666;
      line-height:1.6;
    }

    textarea{
      width:100%;
      min-height:160px;
      border:1px solid #d9dce5;
      border-radius:14px;
      padding:16px;
      font-size:15px;
      line-height:1.6;
      resize:vertical;
      outline:none;
    }

    textarea:focus{
      border-color:#6b7cff;
      box-shadow:0 0 0 3px rgba(107,124,255,0.15);
    }

    .buttons{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:16px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:16px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:0.15s;
    }

    button:hover{
      transform:translateY(-1px);
    }

    .btn1{
      background:#4d6fff;
      color:white;
    }

    .btn2{
      background:#222;
      color:white;
    }

    .result{
      background:#fafbff;
      border:1px solid #e3e6f0;
      border-radius:14px;
      padding:18px;
      min-height:220px;
      white-space:pre-wrap;
      line-height:1.7;
    }

    .notice{
      margin-top:14px;
      font-size:13px;
      color:#666;
      line-height:1.6;
    }

    .footer{
      text-align:center;
      font-size:13px;
      color:#888;
      line-height:1.8;
      margin-top:40px;
      padding-bottom:20px;
    }

    @media(max-width:700px){
      .buttons{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="title-box">
      <h1>사회문제탐구 AI 도우미</h1>
      <div class="subtitle">
        이 도구는 보고서를 대신 작성하는 AI가 아니라,<br>
        자신의 관심사를 사회문제와 연결하고 연구 질문을 발전시키는 보조 교사입니다.
      </div>
    </div>

    <div class="card">
      <h3>나의 관심사에서 사회문제 찾기</h3>

      <textarea
        id="userInput"
        placeholder="#수면부족 #숏폼중독 #입시스트레스

왜 고등학생들은 수면 부족을 경험할까?"
      ></textarea>

      <div class="buttons">
        <button class="btn1" onclick="askAI('connect')">
          사회학으로 바라보기
        </button>

        <button class="btn2" onclick="askAI('evaluate')">
          사회문제로 연구 질문 만들기
        </button>
      </div>
    </div>

    <div class="card">
      <h3>AI 피드백</h3>

      <div class="result" id="result">
입력 후 원하는 메뉴를 눌러주세요.
      </div>

      <div class="notice">
        ※ AI의 답변은 참고용입니다.<br>
        실제 기사·통계·자료는 반드시 직접 확인해야 합니다.
      </div>
    </div>

    <footer class="footer">
      ⓒ 2026 신연지 | 사회문제탐구 AI 도우미<br>
      본 도구는 교육 목적의 탐구 활동 지원을 위해 제작되었습니다.<br>
      contact : socialstudyhard@gmail.com
    </footer>

  </div>

  <script>
    const API_ENDPOINT =
      "https://project-6cov5.vercel.app/api/chat";

    async function askAI(mode){
      const input = document.getElementById("userInput").value;
      const result = document.getElementById("result");

      if(!input.trim()){
        result.innerText = "먼저 관심사나 연구 질문을 입력해주세요.";
        return;
      }

      result.innerText = "AI가 질문을 만들고 있습니다...";

      let systemPrompt = "";

      if(mode === "connect"){
        systemPrompt = `
너는 고등학교 사회문제탐구 수업의 보조 교사다.

학생의 관심사, 해시태그, 고민, 일상 경험을 사회학적으로 바라보도록 돕는다.

중요 원칙:
- 정답을 주지 않는다.
- 보고서 문장을 대신 작성하지 않는다.
- 학생이 스스로 생각할 수 있도록 질문을 많이 제공한다.
- 답변은 여러 가능성을 열어주는 방식으로 작성한다.
- 고등학생이 이해할 수 있는 쉬운 말로 답한다.
- 답변은 너무 길지 않게 작성한다.

반드시 다음 형식으로 답한다.

1. 사회학적으로 연결해볼 수 있는 방향
- 3가지 제시

2. 개인 경험과 사회가 연결되는 지점
- 짧게 설명

3. 더 생각해볼 질문
- 학생이 탐구로 발전시킬 수 있는 질문 4개 제시
`;
      }

      else if(mode === "evaluate"){
        systemPrompt = `
너는 고등학교 사회문제탐구 수업의 연구 질문 코치다.

학생이 입력한 관심사나 연구 질문을 바탕으로 탐구 가능한 연구 질문을 만들도록 돕는다.

중요 원칙:
- 정답을 주지 않는다.
- 보고서, 결론, 해결방안을 대신 작성하지 않는다.
- 학생의 주제를 평가하되, 단정하지 않는다.
- 답보다 질문을 제공한다.
- 하나의 정답이 아니라 여러 방향을 제안한다.
- 고등학생 수준에서 실제 조사 가능한 방향을 제안한다.

반드시 다음 형식으로 답한다.

1. 현재 주제의 가능성
- 사회적 의미, 조사 가능성, 수행 가능성을 짧게 점검

2. 조심할 점
- 너무 넓은 부분이나 윤리적으로 주의할 점 제시

3. 연구 질문 후보
- 학생이 고를 수 있도록 연구 질문 4개 제시

4. 스스로 점검할 질문
- 학생이 자신의 주제를 다시 생각해볼 질문 3개 제시
`;
      }

      try{
        const response = await fetch(API_ENDPOINT, {
          method:"POST",
          headers:{
            "Content-Type":"application/json"
          },
          body:JSON.stringify({
            systemPrompt:systemPrompt,
            studentInput:input
          })
        });

        const data = await response.json();

        if(data.error){
          result.innerText = "오류: " + data.error;
          return;
        }

        result.innerText = data.answer;
      }

      catch(error){
        result.innerText = "오류가 발생했습니다: " + error.message;
      }
    }
  </script>
</body>
</html>
