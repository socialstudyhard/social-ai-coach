<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>관심에서 사회문제로</title>

  <style>

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      padding:40px 20px;
      background:#f4f6fb;
      font-family:Pretendard, sans-serif;
      color:#222;
    }

    .container{
      max-width:900px;
      margin:0 auto;
    }

    .title-box,
    .card{
      background:white;
      border-radius:20px;
      padding:30px;
      margin-bottom:20px;
      box-shadow:0 8px 24px rgba(0,0,0,0.06);
    }

    h1{
      margin:0 0 10px;
      font-size:32px;
    }

    .subtitle{
      color:#555;
      line-height:1.7;
    }

    .credit{
      margin-top:18px;
      font-size:12px;
      color:#999;
    }

    textarea{
      width:100%;
      min-height:160px;
      border:1px solid #ddd;
      border-radius:14px;
      padding:16px;
      font-size:15px;
      line-height:1.6;
      resize:vertical;
    }

    .buttons{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:16px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:16px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }

    button:disabled{
      opacity:0.6;
      cursor:not-allowed;
    }

    .btn1{
      background:#4d6fff;
      color:white;
    }

    .btn2{
      background:#222;
      color:white;
    }

    .result{
      background:#fafbff;
      border:1px solid #e3e6f0;
      border-radius:14px;
      padding:18px;
      min-height:220px;
      white-space:pre-wrap;
      line-height:1.7;
    }

    .notice{
      margin-top:14px;
      font-size:13px;
      color:#666;
      line-height:1.6;
    }

    .footer{
      text-align:center;
      font-size:13px;
      color:#888;
      line-height:1.8;
      margin-top:40px;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="title-box">

      <h1>관심에서 사회문제로</h1>

      <div class="subtitle">
        정답을 대신 작성하는 AI가 아니라,<br>
        질문을 탐구로 발전시키는 사회문제탐구 파트너입니다.
      </div>

      <div class="credit">
        created by 연지T
      </div>

    </div>

    <div class="card">

      <h3>나의 관심사에서 사회문제 찾기</h3>

      <textarea
        id="userInput"
        maxlength="500"
        placeholder="#스카 #오운완 #도파민 #퍼컬 #최애 #현타"
      ></textarea>

      <div class="buttons">

        <button class="btn1" onclick="askAI('connect')">
          사회학으로 바라보기
        </button>

        <button class="btn2" onclick="askAI('evaluate')">
          사회문제로 연구 질문 만들기
        </button>

      </div>

    </div>

    <div class="card">

      <h3>AI 피드백</h3>

      <div class="result" id="result">
입력 후 원하는 메뉴를 눌러주세요.
      </div>

    </div>

    <footer class="footer">
      ⓒ 2026 신연지 | 관심에서 사회문제로
    </footer>

  </div>

  <script>

    const API_ENDPOINT =
      "https://project-6cov5.vercel.app/api/chat";

    const LOG_ENDPOINT =
      "https://script.google.com/macros/s/AKfycbyMF1jvZABPma8spg0FPDGaMZIgUzRAsxqGyZktpJJpEAZiPScKjo4AYIi1Vw7jHWM_lg/exec";

    const bannedWords = [
      "시발","씨발","병신","섹스","자살"
    ];

    function containsBannedWord(text){

      const normalized =
        text.toLowerCase().replace(/\s/g,"");

      return bannedWords.some(word =>
        normalized.includes(word)
      );

    }

    function setButtonsDisabled(disabled){

      const buttons =
        document.querySelectorAll("button");

      buttons.forEach(btn => {

        btn.disabled = disabled;

      });

    }

    async function askAI(mode){

      const input =
        document.getElementById("userInput").value;

      const result =
        document.getElementById("result");

      if(!input.trim()){

        result.innerText =
          "먼저 입력해주세요.";

        return;

      }

      if(containsBannedWord(input)){

        result.innerText =
          "적절한 표현을 사용해주세요.";

        return;

      }

      setButtonsDisabled(true);

      result.innerText =
        "AI가 질문을 만들고 있습니다...";

      try{

        const response = await fetch(API_ENDPOINT, {

          method:"POST",

          headers:{
            "Content-Type":"application/json"
          },

          body:JSON.stringify({

            mode:mode,
            studentInput:input

          })

        });

        const data =
          await response.json();

        if(data.error){

          result.innerText =
            "오류: " + data.error;

          setButtonsDisabled(false);

          return;

        }

        result.innerText =
          data.answer;

        await fetch(LOG_ENDPOINT, {

          method:"POST",

          body:JSON.stringify({

            input:input,
            mode:mode,
            answer:data.answer

          })

        });

      }

      catch(error){

        result.innerText =
          "오류: " + error.message;

      }

      finally{

        setButtonsDisabled(false);

      }

    }

  </script>

</body>
</html>
